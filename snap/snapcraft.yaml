name: copyright-audit
base: core24
version: '1.0'
summary: Debian copyright file generator, validator, and reviewer
description: |
  A Debian debian/copyright file generator, validator, and reviewer.
  Scans source trees using ScanCode Toolkit or licensecheck.

  Three modes:
    - check (default): validate existing debian/copyright
    - generate: scan source tree and produce a new debian/copyright
    - review: structured pass/fail report for archive review

  Features include DEP-5 validation, license mismatch detection,
  copyright holder auditing with fuzzy matching, automatic license
  fetching from SPDX and Creative Commons APIs, interactive fix mode,
  and 130+ SPDX-to-DEP-5 license mappings.
license: GPL-3.0+
title: Copyright Audit
contact: https://github.com/eeickmeyer/copyright-audit/issues
issues: https://github.com/eeickmeyer/copyright-audit/issues
source-code: https://github.com/eeickmeyer/copyright-audit
website: https://github.com/eeickmeyer/copyright-audit
donation: https://ubuntustudio.org/contribute
grade: stable
confinement: strict

lint:
  ignore:
    # These .so files are loaded at runtime via ctypes.CDLL() by scancode,
    # which the static library linter cannot detect.
    - library:
        - scancode/lib/python3.12/site-packages/extractcode_libarchive/lib/*
        - scancode/lib/python3.12/site-packages/typecode_libmagic/lib/*
        - usr/lib/*/libgomp.so*

apps:
  copyright-audit:
    command: bin/copyright-audit
    plugs:
      - home
      - removable-media
      - network
    environment:
      PATH: $SNAP/scancode/bin:$SNAP/usr/bin:$SNAP/bin:$PATH
      PYTHONPATH: $SNAP/scancode/lib/python3.12/site-packages:$SNAP/usr/lib/python3/dist-packages
      PYTHONUNBUFFERED: "1"
      PERL5LIB: $SNAP/usr/share/perl5:$SNAP/usr/lib/x86_64-linux-gnu/perl5/5.38:$SNAP/usr/lib/aarch64-linux-gnu/perl5/5.38:$SNAP/usr/lib/s390x-linux-gnu/perl5/5.38:$SNAP/usr/lib/powerpc64le-linux-gnu/perl5/5.38:$SNAP/usr/lib/arm-linux-gnueabihf/perl5/5.38
      GIT_EXEC_PATH: $SNAP/usr/lib/git-core
      GIT_TEMPLATE_DIR: $SNAP/usr/share/git-core/templates

parts:
  copyright-audit:
    plugin: dump
    source: .
    organize:
      copyright-audit: bin/copyright-audit
    stage:
      - bin/copyright-audit

  scancode-toolkit:
    plugin: nil
    build-packages:
      - python3-dev
      - python3-venv
      - gcc
      - pkg-config
      - libicu-dev
      - libffi-dev
      - libssl-dev
      - libxml2-dev
      - libxslt1-dev
    override-build: |
      python3 -m venv "${SNAPCRAFT_PART_INSTALL}/scancode"
      "${SNAPCRAFT_PART_INSTALL}/scancode/bin/pip" install --upgrade pip
      # Pre-install extractcode to work around its invalid Requires-Python
      # specifier (>=3.6.*) that causes pip backtracking on architectures
      # without pre-built wheels (arm64, s390x, ppc64el, armhf).
      # Do NOT use extractcode[full] — the "full" extra requires extractcode-7z
      # and extractcode-libarchive which only have x86_64 wheels.
      "${SNAPCRAFT_PART_INSTALL}/scancode/bin/pip" install 'extractcode>=31.0.0' --ignore-requires-python
      "${SNAPCRAFT_PART_INSTALL}/scancode/bin/pip" install scancode-toolkit
      find "${SNAPCRAFT_PART_INSTALL}/scancode/bin" -maxdepth 1 -type f -exec \
        sed -i '1s|^#!.*python.*$|#!/usr/bin/env python3|' {} +
      # Replace multiprocessing.Pool with a serial executor so scancode
      # works under strict snap confinement (which blocks POSIX semaphores).
      _pool="${SNAPCRAFT_PART_INSTALL}/scancode/lib/python3.12/site-packages/scancode/pool.py"
      python3 -c "
      import textwrap, pathlib
      pathlib.Path('$_pool').write_text(textwrap.dedent('''
          class _SerialResult:
              def __init__(self, value):
                  self._value = value
              def get(self, timeout=None):
                  return self._value

          class _SerialPool:
              def __init__(self, *a, **kw):
                  pass
              def imap_unordered(self, func, iterable, chunksize=1):
                  for item in iterable:
                      yield func(item)
              def imap(self, func, iterable, chunksize=1):
                  for item in iterable:
                      yield func(item)
              def apply_async(self, func, args=(), kwargs=None):
                  return _SerialResult(func(*args, **(kwargs or {})))
              def map(self, func, iterable, chunksize=None):
                  return [func(item) for item in iterable]
              def close(self):
                  pass
              def join(self):
                  pass
              def terminate(self):
                  pass
              def __enter__(self):
                  return self
              def __exit__(self, *a):
                  pass

          class ScanCodeTimeoutError(Exception):
              pass

          def get_pool(processes=None, initializer=None, initargs=(), maxtasksperchild=None):
              if initializer:
                  initializer(*initargs)
              return _SerialPool()
      ''').lstrip())
      "

  common-licenses:
    plugin: nil
    stage-packages:
      - base-files
    stage:
      - usr/share/common-licenses/

  runtime-deps:
    plugin: nil
    stage-packages:
      - python3
      - git
      - sed
      - coreutils
      - licensecheck
      - decopy
      - python3-tqdm
      - libgomp1
